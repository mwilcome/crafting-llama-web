<div class="design-card">
    <img class="design-image" [src]="design.heroImage" [alt]="design.name" />

    <div class="design-info">
        <h2>{{ design.name }}</h2>
        <p class="description">{{ design.description }}</p>
        @if (!!design.variants && design.variants.length > 0) {
            <p class="variants-note">Includes multiple style options</p>
        }
    </div>
</div>
