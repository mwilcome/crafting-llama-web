<section class="variant-selector">
    <h2 class="step-title">Select a Variant</h2>

    @if (variants().length > 0) {
        <div class="variant-list">
            @for (variant of variants(); track variant.id) {
                <button
                        class="variant-card"
                        type="button"
                        (click)="select(variant)"
                >
                    <span class="variant-name">{{ variant.name }}</span>

                    @if (variant.heroImage) {
                        <img [src]="variant.heroImage" [alt]="variant.name" />
                    }
                </button>
            }
        </div>
    } @else {
        <p class="no-variants">No variants available for this design.</p>
    }
</section>
