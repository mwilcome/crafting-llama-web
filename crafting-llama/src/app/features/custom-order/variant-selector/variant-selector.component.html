<section class="variant-selector">
    <h2 class="variant-heading">Select a Variant</h2>

    <div class="variant-grid">
        @for (variant of variants(); track variant.id) {
            <button
                    type="button"
                    class="variant-card"
                    [class.selected]="variant.id === currentEntry()?.variantId"
                    (click)="select(variant)"
                    [attr.aria-pressed]="variant.id === currentEntry()?.variantId"
            >
                <img
                        [src]="variant.heroImage"
                        [alt]="variant.name + ' preview'"
                        class="variant-image"
                />
                <div class="variant-meta">
                    <span class="variant-name">{{ variant.name }}</span>
                    <span class="variant-price">from ${{ variant.price }}</span>
                </div>
            </button>
        }
    </div>
</section>
