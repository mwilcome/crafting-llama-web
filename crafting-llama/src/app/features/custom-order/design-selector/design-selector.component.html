<section class="design-selector">
    <h2 class="step-title">Select a Design</h2>

    <div class="design-grid">
        @for (design of designs(); track design.id) {
            <button class="card" type="button" (click)="select(design)">
                <img class="thumb" [src]="design.heroImage" [alt]="design.name + ' example'" />
                <div class="info">
                    <div class="title">{{ design.name }}</div>
                    <div class="desc">{{ design.description }}</div>
                    <div class="price-pill">from ${{ design.priceFrom }}</div>
                </div>
            </button>
        }
    </div>
</section>
