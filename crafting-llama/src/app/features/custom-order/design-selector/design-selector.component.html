<section class="design-selector">
    <h2 class="step-title">Select a Design</h2>

    <div class="design-grid">
        @for (design of designs; track design.id) {
            <button class="card" type="button" (click)="select(design)">
                <img class="thumb" [src]="design.heroImage" [alt]="design.name + ' design example'" />
                <div class="info">
                    <span class="title">{{ design.name }}</span>
                </div>
            </button>
        }
    </div>
</section>
