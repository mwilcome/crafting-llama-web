<section class="design-selector">
    <h1>Select a Design</h1>

    @if (selected()) {
        <div class="selector-grid">
            <!-- Thumbnails -->
            <aside class="thumbnail-list">
                @for (design of designs(); track design.id) {
                    <button
                            class="thumbnail"
                            [class.active]="isSelected(design)"
                            (click)="selected.set(design)"
                            type="button"
                            [attr.aria-label]="'Preview ' + design.name"
                    >
                        <img [src]="design.heroImage" [alt]="design.name" />
                    </button>
                }
            </aside>

            <!-- Large Preview -->
            @if (selected()) {
                <div class="preview">
                    <app-design-card [design]="selected()!" />
                    <button class="btn-primary" (click)="choose()">Choose This Design</button>
                </div>
            }
        </div>
    }
</section>
