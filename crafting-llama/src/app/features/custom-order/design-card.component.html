<button class="card" type="button" (click)="click()" [class.selected]="selected">
    <img class="thumb" [src]="design.heroImage" [attr.alt]="design.name + ' design example'">
    <div class="info">
        <span class="title">{{ design.name }}</span>
        <span class="price-pill">from ${{ design.priceFrom }}</span>
        <small *ngIf="design.description">{{ design.description }}</small>
    </div>
</button>
