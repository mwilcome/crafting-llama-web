<section class="custom-order">
    <div class="container">

        <h1>Place a Custom Order</h1>

        <!-- design picker -->
        <ng-container *ngIf="formOpen && !selectedDesign">
            <p>Select a design type to get started:</p>

            <div class="type-buttons">
                <app-design-card
                        *ngFor="let d of designs"
                        [design]="d"
                        (select)="selectDesignType(d)">
                </app-design-card>
            </div>
        </ng-container>

        <!-- order form -->
        <form *ngIf="selectedDesign && !showReview"
              [formGroup]="form" novalidate>

            <h2>{{ selectedDesign.name }}</h2>

            <div *ngFor="let field of selectedDesign.fields" class="form-field-group">

                <!-- common label -->
                <label class="field-label">
                    {{ field.label }}
                    <span *ngIf="field.required" class="required">*</span>
                </label>

                <!-- controls -->
                <input *ngIf="field.type === 'text'" class="input"
                       [formControlName]="field.name" [placeholder]="field.placeholder || ''"/>

                <textarea *ngIf="field.type === 'textarea'" class="input"
                          [formControlName]="field.name" [placeholder]="field.placeholder || ''"></textarea>

                <select *ngIf="field.type === 'dropdown'" class="input"
                        [formControlName]="field.name">
                    <option *ngFor="let opt of field.options" [value]="opt">{{ opt }}</option>
                </select>

                <div *ngIf="field.type === 'radio'" class="option-list">
                    <label *ngFor="let opt of field.options" class="radio-option">
                        <input type="radio" [formControlName]="field.name" [value]="opt"/> {{ opt }}
                    </label>
                </div>

                <div *ngIf="field.type === 'multiselect'" class="option-list">
                    <label *ngFor="let opt of field.options" class="checkbox-option">
                        <input type="checkbox" [value]="opt"
                               (change)="onMultiSelectChange($event, field.name)"/> {{ opt }}
                    </label>
                </div>

                <div *ngIf="field.type === 'color'" class="color-swatches">
                    <label *ngFor="let c of threadColors" class="swatch-label">
                        <input type="radio" [formControlName]="field.name" [value]="c.hex"/>
                        <span class="swatch" [style.background]="c.hex"></span>
                        <span class="swatch-name">{{ c.name }}</span>
                    </label>
                </div>

                <input *ngIf="field.type === 'file'" type="file" class="input"
                       (change)="onFileChange($event, field.name)"/>

                <small class="error" *ngIf="submitted && form.get(field.name)?.invalid">
                    This field is required
                </small>
            </div>

            <button type="button" class="submit-button" (click)="next()">Next → Review</button>
        </form>

        <!-- review + success remain unchanged -->
        <ng-container *ngIf="showReview"> … </ng-container>
        <ng-container *ngIf="successMessage"> … </ng-container>

    </div>
</section>
