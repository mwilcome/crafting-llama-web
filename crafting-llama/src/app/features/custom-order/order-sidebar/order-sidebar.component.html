<aside class="order-sidebar">
    <h3>Current Order</h3>

    @if (entries().length > 0) {
        <ul>
            @for (entry of entries(); track entry.id) {
                <li>
                    {{ getDesign(entry) }}
                    @if (entry.variantId) {
                        — <em>{{ getVariant(entry) }}</em>
                    }
                    ×{{ entry.quantity }}
                </li>
            }
        </ul>
    } @else {
        <p>No items yet.</p>
    }
</aside>
