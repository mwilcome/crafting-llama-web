<section class="entry-form">
    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="form-fields">
            @for (field of requiredFields(); track field.key) {
                <app-field-renderer
                        *ngFor="let field of requiredFields(); track field.key"
                        [field]="field"
                        [form]="form"
                        [showErrors]="showErrors"
                />
            }

            @if (!optionalVisible()) {
                <button type="button" class="btn-secondary" (click)="optionalVisible.set(true)">
                    Show More Options
                </button>
            }

            @if (optionalVisible()) {
                @for (field of optionalFields(); track field.key) {
                    <app-field-renderer [field]="field" [form]="form" [showErrors]="showErrors" />
                }
            }

            <div class="form-group" [class.has-error]="showErrors('quantity')">
                <label for="quantity">
                    Quantity
                    <span class="required-asterisk" aria-hidden="true">*</span>
                </label>
                <input
                        id="quantity"
                        type="number"
                        formControlName="quantity"
                        min="1"
                        placeholder="1"
                />
                @if (showErrors('quantity')) {
                    <div class="field-error">Quantity must be at least 1</div>
                }
            </div>
        </div>

        <div class="form-footer">
            <button type="submit" class="btn-primary" [disabled]="!form.valid">
                Add to Order
            </button>
        </div>
    </form>
</section>
