<h1 class="page-title">Customize Your Item</h1>

@if (draft) {
    <form [formGroup]="form()" (ngSubmit)="onSubmit()" novalidate>
        @for (field of draft.fields; track field.key) {
            <app-field-renderer
                    [field]="field"
                    [form]="form()"
            />
        }

        <div class="form-actions">
            <button
                    type="submit"
                    class="btn"
                    [disabled]="!form().valid"
            >
                Add to Order
            </button>
        </div>
    </form>
}
