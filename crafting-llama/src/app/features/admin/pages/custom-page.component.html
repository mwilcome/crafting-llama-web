<h2>Edit Custom Design</h2>

<div class="admin-custom-grid">
    <form [formGroup]="form" (ngSubmit)="save()" class="editor">

        <!-- ── Design basics ── -->
        <h3>Design info</h3>

        <label>Name <input formControlName="name" required /></label>

        <label>Description
            <textarea formControlName="description"></textarea>
        </label>

        <!-- Design-level hero -->
        <image-upload (file)="onHeroSelected($event)"></image-upload>

        <label>Starting price ($) <input type="number" formControlName="priceFrom" /></label>

        <label>Tags (comma separated) <input formControlName="tags" /></label>

        <!-- ── Global field editor ── -->
        <h3>Fields (apply to entire design)</h3>
        <field-def-editor [array]="fields"></field-def-editor>

        <!-- ── Variants ── -->
        <h3>Variants</h3>
        <button type="button" (click)="addVariant()">+ Add variant</button>

        @for (vCtrl of variants.controls; track vCtrl; let i = $index) {

            <section [formGroup]="vCtrl" class="variant-block">
                <header>
                    <h4>Variant {{ i + 1 }}</h4>
                    <button type="button"
                            aria-label="Remove variant"
                            (click)="removeVariant(i)">✕</button>
                </header>

                <!-- name / price / description -->
                <label>Name <input formControlName="name" required /></label>
                <label>Price <input type="number" formControlName="price" /></label>
                <label>Description <input formControlName="description" /></label>

                <!-- per-variant hero -->
                <image-upload (file)="onVariantHeroSelected(i, $event)"></image-upload>
                @if (vCtrl.controls.heroImage.value) {
                    <img class="thumb" [src]="vCtrl.controls.heroImage.value" alt="variant hero" />
                }

                <!-- per-variant fields -->
                <field-def-editor [array]="vCtrl.controls.fields"
                                  header="Fields for this variant"></field-def-editor>
            </section>
        }

        <button type="submit" [disabled]="form.invalid">💾 Save design</button>
    </form>

    <!-- live preview -->
    <div class="preview">
        <admin-design-preview [design]="preview()"></admin-design-preview>
    </div>
</div>
