<section class="gallery">
    <h1 class="gallery-title">Gallery</h1>

    <div class="gallery-grid">
        @for (item of hydratedItems(); track item.id) {
            <figure class="gallery-card">
                <img
                        [src]="item.fullUrl"
                        class="gallery-image"
                        alt="{{ item.title }}"
                />
                <figcaption class="gallery-meta">
                    <p class="caption">{{ item.title }}</p>
                    <p class="tags">@if (item.tags.length) { {{ item.tags.join(', ') }} }</p>
                    <p class="date">@if (item.publishedAt) { {{ item.publishedAt }} }</p>
                </figcaption>
            </figure>
        }
    </div>
</section>
