<section class="order-composer">
    <h1 class="page-title">Place a Custom Order</h1>

    <ng-container *ngIf="step() === 'select' && draft()">
        <p class="step-label">Step 1 of 4: Choose a Design</p>
        <app-design-selector
                [draft]="draft()"
                [designs]="designs()"
                (select)="onDesignSelected($event)" />
    </ng-container>

    <ng-container *ngIf="step() === 'variant' && draft()?.design">
        <p class="step-label">Step 2 of 4: Choose a Variant</p>
        <app-variant-selector
                [design]="draft().design!"
                [selected]="draft().variant?.id || null"
                (select)="onVariantSelected($event)" />
    </ng-container>

    <ng-container *ngIf="step() === 'form' && draft()?.design">
        <p class="step-label">Step 3 of 4: Customize Your Item</p>
        <app-entry-form
                [design]="draft().design!"
                [variant]="draft().variant ?? null"
                [initialForm]="draft().form!"
                [isEditing]="isEditing"
                (complete)="onFormCompleted($event)"
                (back)="onBack()" />
    </ng-container>

    <ng-container *ngIf="step() === 'review'">
        <p class="step-label">Step 4 of 4: Review Your Order</p>
        <app-review-list
                [drafts]="drafts()"
                (editDraft)="onEditDraft($event)"
                (removeDraft)="onRemoveDraft($event)"
                (addNew)="onAddNewDraft()" />
    </ng-container>
</section>
