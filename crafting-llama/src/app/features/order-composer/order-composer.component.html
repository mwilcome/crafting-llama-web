<section class="order-composer">
    <h1 class="page-title">Place a Custom Order</h1>

    <ng-container *ngIf="step() === 'select' && draft()">
        <app-design-selector
                [draft]="draft()"
                [designs]="designs()"
                (select)="onDesignSelected($event)" />
    </ng-container>

    <ng-container *ngIf="step() === 'variant' && draft()?.design">
        <app-variant-selector
                [design]="draft()?.design"
                [selected]="draft()?.variant?.id || null"
                (select)="onVariantSelected($event)" />
    </ng-container>

    <ng-container *ngIf="step() === 'form' && draft()?.design">
        <app-entry-form
                [design]="draft()!.design"
                [variant]="draft()?.variant || null"
                [initialForm]="draft()?.form ?? null"
                (formChange)="onFormReady($event)" />
    </ng-container>

    <ng-container *ngIf="step() === 'review'">
        <app-review-list
                [drafts]="drafts()"
                (editDraft)="onEditDraft($event)"
                (removeDraft)="onRemoveDraft($event)"
                (addNew)="onAddNewDraft()" >
        </app-review-list>
    </ng-container>
</section>
