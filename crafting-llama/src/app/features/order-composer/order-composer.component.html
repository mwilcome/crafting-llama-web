<section class="order-composer">
    <h1 class="page-title">Place a Custom Order</h1>

    <ng-container *ngIf="step() === 'select' && draft()">
        <app-design-selector
                [draft]="draft()"
                [designs]="designs()"
                (select)="onDesignSelected($event)" />
    </ng-container>

    <ng-container *ngIf="step() === 'variant' && draft() as current">
        <app-variant-selector
                [design]="current.design!"
                [selected]="current.variant?.id || null"
                (select)="onVariantSelected($event)" />
    </ng-container>

    <ng-container *ngIf="step() === 'form' && draft() as current">
        <app-entry-form
                [design]="current.design!"
                [variant]="current.variant ?? null"
                [initialForm]="current.form ?? null"
                (formChange)="onFormReady($event)" />
    </ng-container>

    <ng-container *ngIf="step() === 'review'">
        <app-review-list
                [drafts]="drafts()"
                (editDraft)="onEditDraft($event)"
                (removeDraft)="onRemoveDraft($event)"
                (addNew)="onAddNewDraft()" />
    </ng-container>
</section>
