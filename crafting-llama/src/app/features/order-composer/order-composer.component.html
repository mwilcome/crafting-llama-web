<section class="order-composer">
    <h1 class="page-title">Place a Custom Order</h1>

    <ng-container *ngIf="step$ | async as step">
        <div *ngIf="step === 'select'">
            <app-design-selector
                    [designs]="designs"
                    (select)="ctx.selectDesign($event)"
            />
        </div>

        <div *ngIf="step === 'variant'">
            <p>[Step 2: Variant Selector goes here]</p>
        </div>

        <div *ngIf="step === 'form'">
            <p>[Step 3: Entry Form goes here]</p>
        </div>

        <div *ngIf="step === 'review'">
            <p>[Step 4: Review List goes here]</p>
        </div>
    </ng-container>
</section>
