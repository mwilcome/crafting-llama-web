<form *ngIf="form()" [formGroup]="form()!" (ngSubmit)="onSubmit()" novalidate class="entry-form">
    <ng-container *ngFor="let field of (variant?.fields || design?.fields || [])">
        <div class="form-group" *ngIf="field.type !== 'hidden'">
            <label>
                {{ field.label }}
                <span *ngIf="field.required">*</span>
            </label>

            <input
                    *ngIf="field.type === 'text'"
                    type="text"
                    [formControlName]="field.name"
                    [placeholder]="field.placeholder" />

            <textarea
                    *ngIf="field.type === 'textarea'"
                    [formControlName]="field.name"
                    [placeholder]="field.placeholder"></textarea>

            <select
                    *ngIf="field.type === 'dropdown'"
                    [formControlName]="field.name">
                <option *ngFor="let option of field.options" [value]="option">
                    {{ option }}
                </option>
            </select>

            <div *ngIf="field.type === 'radio'">
                <label *ngFor="let option of field.options">
                    <input
                            type="radio"
                            [value]="option"
                            [formControlName]="field.name" />
                    {{ option }}
                </label>
            </div>

            <div *ngIf="field.type === 'multiselect'">
                <label *ngFor="let option of field.options">
                    <input
                            type="checkbox"
                            [value]="option"
                            (change)="onMultiSelectChange($event, field.name)"
                            [checked]="form()?.get(field.name)?.value?.includes(option)" />
                    {{ option }}
                </label>
            </div>

            <div *ngIf="field.type === 'file'">
                <input
                        type="file"
                        accept="image/*"
                        (change)="onFileInput($event, field.name)" />
                <img
                        *ngIf="imagePreviews()[field.name]"
                        [src]="imagePreviews()[field.name]"
                        alt="Preview" />
            </div>
        </div>
    </ng-container>

    <div class="form-actions">
        <button type="button" class="btn-outline" (click)="onBackClick()">← Back</button>
        <button type="submit" class="btn-primary">+ Add to Order</button>
    </div>
</form>
