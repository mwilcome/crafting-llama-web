<section class="variant-selector">
    <h2>Select a Variant</h2>

    <div class="variant-list">
        <div
                class="variant-card"
                *ngFor="let variant of design.variants ?? []"
                (click)="onClick(variant)"
                [class.selected]="isSelected(variant)">
            <h3>{{ variant.name }}</h3>
            <img *ngIf="variant.heroImage" [src]="variant.heroImage" alt="{{ variant.name }}" />
        </div>
    </div>
</section>
