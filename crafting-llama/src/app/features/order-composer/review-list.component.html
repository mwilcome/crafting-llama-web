<section class="review-list">
    <h2>Review Your Custom Items</h2>

    <div *ngFor="let draft of drafts" class="review-item">
        <div class="info">
            <strong>{{ draft.design.name }}</strong>
            <div *ngIf="draft.variant">{{ draft.variant.name }}</div>
        </div>
        <div class="actions">
            <button (click)="edit(draft)">Edit</button>
            <button (click)="remove(draft.id)">Remove</button>
        </div>
    </div>

    <button class="add-new" (click)="newDraft()">+ Add Another</button>
</section>
