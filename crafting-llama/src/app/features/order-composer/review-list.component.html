<section class="review-list">
    <h2>Review Your Custom Items</h2>

    <div *ngFor="let entry of drafts">
        <div class="review-card">
            <div class="name">
                {{ entry.design.name }}
                <ng-container *ngIf="entry.variant">
                    <br />
                    {{ entry.variant.name }}
                </ng-container>
            </div>

            <div class="buttons">
                <button class="btn btn-outline" type="button" (click)="edit(entry)">Edit</button>
                <button class="btn btn-outline" type="button" (click)="remove(entry.id)">Remove</button> <!-- ✅ FIXED -->
            </div>
        </div>
    </div>

    <div class="review-card add-new">
        <button class="btn btn-primary" type="button" (click)="add()">+ Add Another</button>
    </div>
</section>
